name: 01 CI Tests

on:
  push:
    branches:
      - 'master'
      - 'release'
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/01-ci-tests.yml'
  pull_request:
    branches:
      - 'master'
      - 'release'

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run frontend tests
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox --no-progress

  cypress-smoke:
    name: Cypress Smoke Test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Run Cypress smoke test
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          install-command: npm ci
          start: npm run start -- --host 0.0.0.0 --port 4200
          wait-on: 'http://localhost:4200'
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/auth/login-success.cy.ts
        env:
          CYPRESS_BASE_URL: http://localhost:4200
