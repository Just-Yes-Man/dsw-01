name: SonarQube
run-name: SonarQube • PR->master • @${{ github.actor }}

on:
  push:
    branches:
      - 'master'
      - 'release'
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  sonarqube-analysis:
    name: SonarQube analysis
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].base.ref == 'master'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: SonarQube scan (Maven)
        working-directory: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B -ntp -DskipTests verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.token="$SONAR_TOKEN" \
            -Dsonar.projectKey="Just-Yes-Man_dsw-01" \
            -Dsonar.organization="just-yes-man"