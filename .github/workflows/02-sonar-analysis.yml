name: 02 Sonar Analysis

on:
  push:
    branches:
      - 'master'
      - 'release'
      - 'develop'
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/02-sonar-analysis.yml'
  workflow_dispatch:

jobs:
  sonar-analysis:
    name: Sonar Analysis + Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run Sonar analysis (non-blocking Quality Gate)
        id: sonar-run
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY != '' && vars.SONAR_PROJECT_KEY || 'Just-Yes-Man_dsw-01' }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_ORGANIZATION || 'just-yes-man' }}
        run: |
          set -euo pipefail

          SONAR_ARGS=""
          if [ -n "${SONAR_PROJECT_KEY}" ]; then
            SONAR_ARGS="${SONAR_ARGS} -Dsonar.projectKey=${SONAR_PROJECT_KEY}"
          fi
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.organization=${SONAR_ORGANIZATION}"

          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.qualitygate.wait=false \
            ${SONAR_ARGS}

      - name: Validate analysis execution
        if: always()
        run: |
          if [ "${{ steps.sonar-run.outcome }}" = "success" ]; then
            echo "Analisis Sonar completado correctamente."
            echo "Quality Gate registrado como informativo (no bloqueante en CI)."
          else
            echo "::error::No se pudo completar el analisis Sonar."
            exit 1
          fi
