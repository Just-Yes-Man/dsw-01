name: 02 Sonar Analysis

on:
  push:
    branches:
      - 'master'
      - 'release'
      - 'develop'
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/02-sonar-analysis.yml'
  workflow_dispatch:

jobs:
  sonar-analysis:
    name: Sonar Analysis + Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate Sonar project access
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY != '' && vars.SONAR_PROJECT_KEY || format('{0}_{1}', github.repository_owner, github.event.repository.name) }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_ORGANIZATION || 'just-yes-man' }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::error::Falta el secret SONAR_TOKEN en GitHub."
            exit 1
          fi

          URL="${SONAR_HOST_URL}/api/components/show?component=${SONAR_PROJECT_KEY}&organization=${SONAR_ORGANIZATION}"
          HTTP_CODE=$(curl -sS -u "${SONAR_TOKEN}:" -w "%{http_code}" -o /tmp/sonar_project.json "${URL}")

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::No se pudo acceder al proyecto SonarCloud (HTTP ${HTTP_CODE})."
            echo "::error::Verifica sonar.projectKey=${SONAR_PROJECT_KEY}, sonar.organization=${SONAR_ORGANIZATION} y permisos del SONAR_TOKEN."
            cat /tmp/sonar_project.json || true
            exit 1
          fi

      - name: Build, analyze and wait for Quality Gate
        id: sonar-run
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY != '' && vars.SONAR_PROJECT_KEY || format('{0}_{1}', github.repository_owner, github.event.repository.name) }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION != '' && vars.SONAR_ORGANIZATION || 'just-yes-man' }}
        run: |
          set -euo pipefail

          SONAR_ARGS=""
          if [ -n "${SONAR_PROJECT_KEY}" ]; then
            SONAR_ARGS="${SONAR_ARGS} -Dsonar.projectKey=${SONAR_PROJECT_KEY}"
          fi
          SONAR_ARGS="${SONAR_ARGS} -Dsonar.organization=${SONAR_ORGANIZATION}"

          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            ${SONAR_ARGS}

      - name: Validate quality score result
        if: success()
        run: |
          echo "Puntuacion valida: Quality Gate aprobado."
