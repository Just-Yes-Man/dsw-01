name: 02 Sonar Analysis

on:
  push:
    branches:
      - 'master'
      - 'release'
      - 'develop'
    paths:
      - 'src/**'
      - 'pom.xml'
      - '.github/workflows/02-sonar-analysis.yml'
  workflow_dispatch:

jobs:
  sonar-analysis:
    name: Sonar Analysis + Quality Gate
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_PROJECT_KEY: Just-Yes-Man_dsw-01
      SONAR_ORGANIZATION: just-yes-man

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Validate Sonar project access
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::error::Falta el secret SONAR_TOKEN en GitHub."
            exit 1
          fi

          AUTH_CODE=$(curl -sS -u "${SONAR_TOKEN}:" -w "%{http_code}" -o /tmp/sonar_auth.json "${SONAR_HOST_URL}/api/authentication/validate")
          if [ "${AUTH_CODE}" != "200" ] || ! grep -q '"valid":true' /tmp/sonar_auth.json; then
            echo "::error::SONAR_TOKEN invalido o sin acceso a SonarCloud."
            cat /tmp/sonar_auth.json || true
            exit 1
          fi

          URL="${SONAR_HOST_URL}/api/components/show?component=${SONAR_PROJECT_KEY}&organization=${SONAR_ORGANIZATION}"
          HTTP_CODE=$(curl -sS -u "${SONAR_TOKEN}:" -w "%{http_code}" -o /tmp/sonar_project.json "${URL}")

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::No se pudo acceder al proyecto SonarCloud (HTTP ${HTTP_CODE})."
            echo "::error::Verifica sonar.projectKey=${SONAR_PROJECT_KEY}, sonar.organization=${SONAR_ORGANIZATION} y permisos del SONAR_TOKEN."
            cat /tmp/sonar_project.json || true
            exit 1
          fi

      - name: Build, analyze and wait for Quality Gate
        id: sonar-run
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          set -euo pipefail

          echo "Using sonar.projectKey=${SONAR_PROJECT_KEY}"
          echo "Using sonar.organization=${SONAR_ORGANIZATION}"
          echo "Using sonar.host.url=${SONAR_HOST_URL}"

          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}" \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300 \
            -Dsonar.verbose=true

      - name: Validate quality score result
        if: success()
        run: |
          echo "Puntuacion valida: Quality Gate aprobado."
