name: 03 Docker Deploy

on:
  workflow_run:
    workflows:
      - 02 Sonar Analysis
    types:
      - completed
  workflow_dispatch:

jobs:
  docker-build-and-push:
    name: Build and Push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image_name: empleados-backend
            context: .
            dockerfile: Dockerfile
          - service: frontend
            image_name: empleados-frontend
            context: ./frontend
            dockerfile: Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKER_USER}" ] || [ -z "${DOCKER_PASSWORD}" ]; then
            echo "::error::Faltan los secrets DOCKER_USER o DOCKER_PASSWORD."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ matrix.image_name }}:latest
            ${{ secrets.DOCKER_USER }}/${{ matrix.image_name }}:${{ github.sha }}
