services:
  postgres:
    image: postgres:16
    container_name: empleados-postgres
    environment:
      POSTGRES_DB: empleadosdb
      POSTGRES_USER: empleados
      POSTGRES_PASSWORD: empleados123
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empleados -d empleadosdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: empleados-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: empleadosdb
      DB_USER: empleados
      DB_PASSWORD: empleados123
      BOOTSTRAP_AUTH_USER: bootstrap_admin@example.com
      BOOTSTRAP_AUTH_PASSWORD: bootstrap123
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:8081
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: empleados-frontend
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"

  proxy:
    image: nginx:1.27-alpine
    container_name: empleados-proxy
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${PROXY_PORT:-8081}:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
