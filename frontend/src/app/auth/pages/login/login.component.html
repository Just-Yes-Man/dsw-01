<section class="login-shell">
  <article class="login-card">
    <header class="login-header">
      <p class="eyebrow">Portal DSW02</p>
      <h1>Iniciar sesión</h1>
      <p class="subtitle">Accede para gestionar empleados y departamentos.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="field-row">
        <label for="email">Correo</label>
        <input id="email" type="email" formControlName="email" autocomplete="email" />
      </div>

      <div class="field-row">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" autocomplete="current-password" />
      </div>

      <p *ngIf="errorMessage" class="error" data-testid="login-error">{{ errorMessage }}</p>

      <button type="submit" class="login-submit">Entrar</button>
    </form>
  </article>
</section>
