<section *ngIf="open" class="confirm-backdrop">
  <article class="confirm-card">
    <h3>Eliminar departamento</h3>
    <p>¿Confirmas eliminar el departamento {{ departamentoId }}?</p>
    <div class="confirm-actions">
      <button type="button" class="secondary" (click)="cancel.emit()" [disabled]="processing">Cancelar</button>
      <button type="button" class="danger" (click)="confirm.emit()" [disabled]="processing">Confirmar</button>
    </div>
  </article>
</section>
