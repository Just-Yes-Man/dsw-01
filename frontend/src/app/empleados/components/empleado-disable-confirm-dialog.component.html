<section *ngIf="open" class="confirm-backdrop">
  <article class="confirm-card">
    <h3>Desactivar empleado</h3>
    <p>¿Confirmas desactivar al empleado {{ empleadoClave }}?</p>
    <div class="confirm-actions">
      <button type="button" (click)="cancel.emit()" [disabled]="processing">Cancelar</button>
      <button type="button" (click)="confirm.emit()" [disabled]="processing">Confirmar</button>
    </div>
  </article>
</section>
