<form [formGroup]="form" (ngSubmit)="submit()" class="form-card panel">
  <h2 class="form-title">{{ mode === 'create' ? 'Crear empleado' : 'Editar empleado' }}</h2>

  <div class="field-grid">
    <div class="field-row">
      <label for="nombre">Nombre</label>
      <input id="nombre" formControlName="nombre" />
    </div>

    <div class="field-row">
      <label for="direccion">Dirección</label>
      <input id="direccion" formControlName="direccion" />
    </div>

    <div class="field-row">
      <label for="telefono">Teléfono</label>
      <input id="telefono" formControlName="telefono" />
    </div>

    <div class="field-row">
      <label for="email">Correo</label>
      <input id="email" type="email" formControlName="email" />
    </div>

    <div class="field-row">
      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" />
    </div>

    <div class="field-row">
      <label for="estadoAcceso">Estado</label>
      <select id="estadoAcceso" formControlName="estadoAcceso">
        <option value="ACTIVO">ACTIVO</option>
        <option value="INACTIVO">INACTIVO</option>
      </select>
    </div>

    <div class="field-row">
      <label for="departamentoId">Departamento</label>
      <input id="departamentoId" type="number" formControlName="departamentoId" />
    </div>
  </div>

  <p *ngIf="backendError" class="error">{{ backendError }}</p>

  <div class="actions">
    <button type="button" class="secondary" (click)="cancel.emit()" [disabled]="submitting">Cancelar</button>
    <button type="submit" [disabled]="submitting">Guardar</button>
  </div>
</form>
