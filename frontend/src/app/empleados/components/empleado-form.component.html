<form [formGroup]="form" (ngSubmit)="submit()">
  <h2>{{ mode === 'create' ? 'Crear empleado' : 'Editar empleado' }}</h2>

  <label for="nombre">Nombre</label>
  <input id="nombre" formControlName="nombre" />

  <label for="direccion">Dirección</label>
  <input id="direccion" formControlName="direccion" />

  <label for="telefono">Teléfono</label>
  <input id="telefono" formControlName="telefono" />

  <label for="email">Correo</label>
  <input id="email" type="email" formControlName="email" />

  <label for="password">Contraseña</label>
  <input id="password" type="password" formControlName="password" />

  <label for="estadoAcceso">Estado</label>
  <select id="estadoAcceso" formControlName="estadoAcceso">
    <option value="ACTIVO">ACTIVO</option>
    <option value="INACTIVO">INACTIVO</option>
  </select>

  <label for="departamentoId">Departamento</label>
  <input id="departamentoId" type="number" formControlName="departamentoId" />

  <p *ngIf="backendError" class="error">{{ backendError }}</p>

  <div class="actions">
    <button type="button" (click)="cancel.emit()" [disabled]="submitting">Cancelar</button>
    <button type="submit" [disabled]="submitting">Guardar</button>
  </div>
</form>
