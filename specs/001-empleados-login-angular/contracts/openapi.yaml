openapi: 3.0.3
info:
  title: Feature 001 - Frontend Employee Login API Contract
  version: 1.0.0
  description: |
    Contract for employee login/logout/session endpoints consumed by Angular frontend.
    Existing legacy Basic endpoints remain available and out of scope for this contract.

servers:
  - url: http://localhost:8080

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate employee by email/password and create session cookie
      operationId: loginEmpleado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session cookie with HttpOnly, Secure, SameSite flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: UNAUTHORIZED
                message: Credenciales inválidas
        '423':
          description: Account temporarily locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: LOCKED
                message: Cuenta bloqueada temporalmente

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Close active employee session
      operationId: logoutEmpleado
      responses:
        '204':
          description: Session closed
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Clears session cookie with Max-Age=0
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/session:
    get:
      tags: [Auth]
      summary: Get current employee session state
      operationId: getSessionState
      responses:
        '200':
          description: Session is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  responses:
    BadRequest:
      description: Request validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Session missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 1

    SessionResponse:
      type: object
      required: [authenticated, empleadoClave, email, expiresAt, idleTimeoutMinutes]
      properties:
        authenticated:
          type: boolean
          example: true
        empleadoClave:
          type: string
          example: EMP-1
        email:
          type: string
          format: email
          example: ana@example.com
        expiresAt:
          type: string
          format: date-time
        idleTimeoutMinutes:
          type: integer
          format: int32
          example: 480

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHORIZED, LOCKED, SERVER_ERROR]
        message:
          type: string
